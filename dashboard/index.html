<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ouvidoria · Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { width: 100%; height: 100%; overflow: hidden; background: oklch(0.18 0.006 260); }
    body { font-family: "Inter", ui-sans-serif, system-ui, -apple-system, sans-serif; }
  </style>
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
</head>
<body>
  <div id="root"></div>

  <!-- React -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- Recharts -->
  <script crossorigin src="https://unpkg.com/recharts@2/umd/Recharts.js"></script>
  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Dashboard modules (order matters: data first, then components) -->
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="mapa-unidades.jsx"></script>
  <script type="text/babel" src="split-triagem.jsx"></script>
  <script type="text/babel" src="command-center.jsx"></script>

  <!-- App bootstrap -->
  <script type="text/babel">
    function App() {
      // Fetch real data on mount + auto-refresh every 60 seconds
      React.useEffect(() => {
        if (typeof window._OUV_FETCH === 'function') window._OUV_FETCH();
        const id = setInterval(() => {
          if (typeof window._OUV_FETCH === 'function') window._OUV_FETCH();
        }, 60_000);
        return () => clearInterval(id);
      }, []);

      return (
        <div style={{ width:'100vw', height:'100vh', display:'flex', overflow:'hidden' }}>
          <CommandCenter standalone />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
