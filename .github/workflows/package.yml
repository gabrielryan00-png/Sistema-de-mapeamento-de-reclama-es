name: Package Ouvidoria

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  build-and-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies (Pillow only for icon)
        run: |
          python -m pip install --upgrade pip
          pip install pillow

      - name: Generate icon
        run: |
          python scripts/generate_icon.py

      - name: Create dist ZIP
        run: |
          mkdir -p dist
          DATE=$(python - <<'PY'
import datetime, subprocess
try:
    ver = subprocess.check_output(['git','describe','--tags','--always'], stderr=subprocess.DEVNULL).decode().strip()
except Exception:
    ver = datetime.date.today().strftime('%Y%m%d')
print(ver)
PY
)
          zip -r dist/ouvidoria-$DATE.zip . -x "venv/*" "*.pyc" "__pycache__/*" ".git/*" "dist/*" || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ouvidoria-package
          path: dist/
